<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-app-region: no-drag;
    }

    .toast {
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      cursor: pointer;
      animation: toast-in 0.3s ease-out;
      margin: 2px;
    }

    .toast.latte {
      background: #e6e9ef;
      border-color: #bcc0cc;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .toast-icon {
      font-size: 15px;
      line-height: 1.4;
      flex-shrink: 0;
      color: #cdd6f4;
    }

    .toast.latte .toast-icon { color: #4c4f69; }

    .toast-content { flex: 1; min-width: 0; }

    .toast-title {
      font-size: 13px;
      font-weight: 600;
      color: #cdd6f4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast.latte .toast-title { color: #4c4f69; }

    .toast-body {
      font-size: 12px;
      color: #a6adc8;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast.latte .toast-body { color: #6c6f85; }

    @keyframes toast-in {
      from { transform: translateX(100px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    @keyframes toast-out {
      from { transform: translateX(0);    opacity: 1; }
      to   { transform: translateX(100px); opacity: 0; }
    }

    .toast.dismissing {
      animation: toast-out 0.3s ease-in forwards;
    }
  </style>
</head>
<body>
  <div class="toast" id="toast">
    <div class="toast-icon" id="icon"></div>
    <div class="toast-content">
      <div class="toast-title" id="title"></div>
      <div class="toast-body" id="body"></div>
    </div>
  </div>

  <script>
    const ICONS = { 'task-done': '✓', 'needs-input': '◌', 'error': '✕', 'info': '·' };

    function dismiss() {
      const toast = document.getElementById('toast');
      toast.classList.add('dismissing');
      setTimeout(() => window.electronNotif.dismiss(), 300);
    }

    window.electronNotif.onShow((notification) => {
      document.getElementById('icon').textContent = ICONS[notification.type] || 'ℹ';
      document.getElementById('title').textContent = notification.title;
      const bodyEl = document.getElementById('body');
      if (notification.body) {
        bodyEl.textContent = notification.body;
        bodyEl.style.display = 'block';
      } else {
        bodyEl.style.display = 'none';
      }
      if (notification.theme === 'latte') {
        document.getElementById('toast').classList.add('latte');
      }
    });

    document.getElementById('toast').addEventListener('click', () => {
      window.electronNotif.click();
    });
  </script>
</body>
</html>

name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            electron_args: --win
            electron_artifacts: release/*.exe
            tauri_artifacts: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/nsis/*.nsis.zip
              src-tauri/target/release/bundle/nsis/*.sig
            artifact_name: dist-Windows

          - os: macos-latest
            electron_args: --mac
            electron_artifacts: |
              release/*.dmg
              release/*.zip
            tauri_artifacts: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app.tar.gz
              src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            artifact_name: dist-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Generate macOS icons
        if: runner.os == 'macOS'
        run: npx tauri icon eventide.png

      - name: Build Electron frontend
        run: npm run build

      - name: Build Tauri frontend
        run: npm run tauri:frontend

      - name: Run Rust tests
        run: cargo test
        working-directory: src-tauri

      - name: Build Electron installer
        run: npx electron-builder ${{ matrix.electron_args }} --publish never

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.electron_artifacts }}
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-tauri
          path: ${{ matrix.tauri_artifacts }}
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

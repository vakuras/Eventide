name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Electron frontend
        run: npm run build

      - name: Build Tauri frontend
        run: npm run tauri:frontend

      - name: Run Rust tests
        run: cargo test
        working-directory: src-tauri

      - name: Build Electron installer
        run: npx electron-builder --win --publish never

      - name: Build Tauri app
        run: |
          echo "TAURI_SIGNING_PRIVATE_KEY length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length)"
          npx tauri build
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: List Tauri build output
        shell: pwsh
        run: Get-ChildItem "src-tauri/target/release/bundle/nsis" -Recurse | ForEach-Object { Write-Host "$($_.Length.ToString().PadLeft(10)) $($_.Name)" }

      - name: Rename Tauri installer and generate latest.json
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          # Rename installer
          Get-ChildItem "$nsisDir/*.exe" | ForEach-Object {
            $newName = $_.Name -replace '^Eventide_', 'Eventide-Tauri-Setup-'
            $newName = $newName -replace '_x64-setup\.exe$', '.exe'
            if ($newName -ne $_.Name) {
              Rename-Item $_.FullName $newName
              Write-Host "Renamed $($_.Name) -> $newName"
            }
          }
          # Generate latest.json for Tauri updater
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $sigFile = Get-ChildItem "$nsisDir/*.nsis.zip.sig" | Select-Object -First 1
          $sig = if ($sigFile) { Get-Content $sigFile.FullName -Raw } else { "" }
          $zipFile = Get-ChildItem "$nsisDir/*.nsis.zip" | Select-Object -First 1
          $zipName = if ($zipFile) { $zipFile.Name } else { "Eventide_${version}_x64-setup.nsis.zip" }
          $json = @{
            version = $version
            notes = "See https://github.com/vakuras/Eventide/releases/tag/v$version"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig.Trim()
                url = "https://github.com/vakuras/Eventide/releases/download/v$version/$zipName"
              }
            }
          } | ConvertTo-Json -Depth 4
          Set-Content "$nsisDir/latest.json" $json
          Write-Host "Generated latest.json for v$version"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-Windows
          path: |
            release/*.exe
            release/latest.yml
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/nsis/latest.json
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
